name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm grub-common xorriso qemu-system-x86 binutils llvm mtools
          echo "=== Debug: mformat location ==="
          which mformat || echo "mformat not found in PATH"
          dpkg -L mtools | grep mformat || echo "mformat not in mtools package"
          ls -la /usr/bin/mformat || echo "No mformat binary"

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          source "$HOME/.cargo/env"
          rustup component add rust-src --toolchain nightly
          rustup component add llvm-tools-preview --toolchain nightly
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"

      - name: Build BerkeOS
        run: |
          source "$HOME/.cargo/env"
          chmod +x build.sh
          ./build.sh

      - name: Verify ISO
        run: |
          ls -la build/
          test -f build/berkeos.iso && ls -lh build/berkeos.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: berkeos-iso
          path: build/berkeos.iso
          retention-days: 30

  test-bios:
    name: Test BIOS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: berkeos-iso
          path: build

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Create disk images
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/berkeos_disk.img bs=1M count=128 status=none
          dd if=/dev/zero of=build/berkeos_disk2.img bs=1M count=256 status=none

      - name: Boot test (BIOS)
        run: |
          timeout 60 qemu-system-x86_64 \
            -m 256M \
            -cdrom build/berkeos.iso \
            -drive file=build/berkeos_disk.img,format=raw,if=ide,index=0,media=disk \
            -drive file=build/berkeos_disk2.img,format=raw,if=ide,index=1,media=disk \
            -boot d \
            -nographic \
            -serial file:build/serial.log \
            2>&1 | tee build/qemu_test.log || true
          cat build/qemu_test.log
          cat build/serial.log || true

      - name: Verify boot
        run: |
          BOOT_LOG=$(cat build/qemu_test.log build/serial.log 2>/dev/null)
          if echo "$BOOT_LOG" | grep -qi "BerkeOS"; then
            echo "PASS: BerkeOS detected in BIOS boot output"
            exit 0
          else
            echo "FAIL: BerkeOS not found in boot output"
            cat build/qemu_test.log
            cat build/serial.log || echo "(no serial log)"
            exit 1
          fi

  test-uefi:
    name: Test UEFI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: berkeos-iso
          path: build

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf

      - name: Create disk images
        run: |
          mkdir -p build
          dd if=/dev/zero of=build/berkeos_disk.img bs=1M count=128 status=none
          dd if=/dev/zero of=build/berkeos_disk2.img bs=1M count=256 status=none

      - name: Find OVMF
        run: |
          for path in /usr/share/OVMF/OVMF.fd /usr/share/qemu/ovmf-x86_64.bin /usr/share/edk2/x64/OVMF.fd; do
            if [ -f "$path" ]; then
              echo "OVMF_PATH=$path" >> $GITHUB_ENV
              echo "Found OVMF at: $path"
              exit 0
            fi
          done
          echo "Downloading OVMF..."
          curl -sL https://github.com/tianocore/edk2/releases/download/ovmf-2024.11/OVMF-x86_64-4M.zip -o /tmp/ovmf.zip
          unzip -q -o /tmp/ovmf.zip -d /tmp/ovmf
          OVMF_PATH=$(find /tmp/ovmf -name 'OVMF.fd' -o -name '*.fd' 2>/dev/null | head -1)
          echo "OVMF_PATH=$OVMF_PATH" >> $GITHUB_ENV

      - name: Boot test (UEFI)
        run: |
          timeout 60 qemu-system-x86_64 \
            -m 256M \
            -cdrom build/berkeos.iso \
            -drive file=build/berkeos_disk.img,format=raw,if=ide,index=0,media=disk \
            -drive file=build/berkeos_disk2.img,format=raw,if=ide,index=1,media=disk \
            -boot order=c,menu=off \
            -nographic \
            -serial file:build/serial.log \
            -bios "$OVMF_PATH" \
            2>&1 | tee build/qemu_test.log || true
          cat build/qemu_test.log
          cat build/serial.log || true

      - name: Verify boot
        run: |
          BOOT_LOG=$(cat build/qemu_test.log build/serial.log 2>/dev/null)
          if echo "$BOOT_LOG" | grep -qi "BerkeOS"; then
            echo "PASS: BerkeOS detected in UEFI boot output"
            exit 0
          else
            echo "FAIL: BerkeOS not found in boot output"
            cat build/qemu_test.log
            cat build/serial.log || echo "(no serial log)"
            exit 1
          fi

  release:
    name: Create Release
    needs: [build, test-bios, test-uefi]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: berkeos-iso
          path: build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.6.3
          name: BerkeOS v0.6.3
          body: |
            ## BerkeOS v0.6.3 - Stabilization Release

            ### What's New
            - Serial Port Driver - COM1 UART at 115200 8N1
            - Logging Macros - kinfo!, kwarn!, kerr!, kdebug!
            - Enhanced Panic Handler - Serial output + stack dump
            - DriveRegistry - Refactored from 12 globals to single struct
            - fsck Command - Filesystem validation tool
            - CI/CD Pipeline - GitHub Actions with BIOS/UEFI tests
            - Test Harness - Automated testing script

            ### Technical Details
            - Build: ISO created with GRUB (BIOS + UEFI)
            - Tests: BIOS boot passed | UEFI boot passed
            - Artifact: berkeos.iso
          draft: false
          prerelease: false
          files: build/berkeos.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
